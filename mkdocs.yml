site_name: SnackHub Projektdokumentation
site_description: Technische und fachliche Projektdokumentation fuer SnackHub
site_author: SnackHub Projektteam
docs_dir: docs

theme:
  name: material
  language: de
  logo: assets/snackhub-wordmark.png
  favicon: assets/snackhub-logo.png
  palette:
    - scheme: default
      primary: amber
      accent: deep orange
  features:
    - navigation.tabs
    - navigation.sections
    - navigation.top
    - content.code.copy
    - content.action.edit
    - search.highlight
    - search.suggest

nav:
  - Home: index.md
  - Installation & Quick Start: installation.md
  - Technische Dokumentation: technical.md
  - Nutzungsanleitung: user-guide.md
  - Technische Strategie: strategy.md

markdown_extensions:
  - admonition
  - attr_list
  - def_list
  - footnotes
  - md_in_html
  - tables
  - toc:
      permalink: true
  - pymdownx.details
  - pymdownx.highlight:
      anchor_linenums: true
  - pymdownx.inlinehilite
  - pymdownx.snippets
  - pymdownx.superfences:
      custom_fences:
        - name: mermaid
          class: mermaid
          format: !!python/name:pymdownx.superfences.fence_code_format
  - pymdownx.tabbed:
      alternate_style: true

plugins:
  - search

extra_css:
  - stylesheets/extra.css

extra_javascript:
  - https://unpkg.com/mermaid@10/dist/mermaid.min.js
  - javascripts/mermaid-init.js

copyright: Copyright 2026 SnackHub Projektteam
