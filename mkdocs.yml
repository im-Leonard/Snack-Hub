site_name: SnackHub Projektdokumentation
site_description: Technische und fachliche Projektdokumentation für SnackHub
site_author: SnackHub Projektteam
site_url: https://im-leonard.github.io/Snack-Hub/
repo_url: https://github.com/im-Leonard/Snack-Hub
repo_name: im-Leonard/Snack-Hub
edit_uri: edit/main/docs/
docs_dir: docs
use_directory_urls: false
strict: true

theme:
  name: material
  language: de
  font: false
  logo: assets/snackhub-wordmark.png
  favicon: assets/snackhub-logo.png
  palette:
    - scheme: default
      primary: amber
      accent: deep orange
  features:
    - navigation.tabs
    - navigation.sections
    - navigation.top
    - content.code.copy
    - content.action.edit
    - search.highlight
    - search.suggest

nav:
  - Home: index.md
  - Installation & Quick Start: installation.md
  - Technische Dokumentation: technical.md
  - Nutzungsanleitung: user-guide.md
  - Technische Strategie: strategy.md

markdown_extensions:
  - admonition
  - attr_list
  - def_list
  - footnotes
  - md_in_html
  - tables
  - toc:
      permalink: true
  - pymdownx.details
  - pymdownx.highlight:
      anchor_linenums: true
  - pymdownx.inlinehilite
  - pymdownx.snippets
  - pymdownx.superfences
  - pymdownx.tabbed:
      alternate_style: true

plugins:
  - search

extra_css:
  - stylesheets/extra.css

copyright: Copyright 2026 SnackHub Projektteam

